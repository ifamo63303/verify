<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFAMO Document Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f4f4f4;
    }
    .box {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .logo { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 8px; }
    .sub  { color: #888; font-size: 14px; margin-bottom: 24px; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { color: #555; font-size: 15px; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: #333;
      color: white;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">IFAMO GmbH</div>
  <div class="sub">Document Verification</div>
  <div class="spinner"></div>
  <div class="msg" id="msg">Redirecting...</div>
  <div id="fallback"></div>
</div>

<script>
  const APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbxUnUjn_pnFfngSH8DbV4owjvABT2A9-8wzspKMh3Ii1XWxZ9lhOIGN15ExuvNrEUW5/exec";

  const params = new URLSearchParams(window.location.search);
  const target = APPS_SCRIPT + "?" + params.toString();

  // iOS'ta script.google.com'u Google Drive app intercept edememesi için
  // window.location yerine link gösteriyoruz, otomatik yönlendirme de yapılıyor
  setTimeout(function() {
    window.location.replace(target);
  }, 300);

  // Yönlendirme çalışmazsa manuel buton göster
  setTimeout(function() {
    document.getElementById("msg").textContent = "Tap the button below to open the document.";
    document.getElementById("fallback").innerHTML =
      '<a class="btn" href="' + target + '">Open Document</a>';
  }, 2000);
</script>
</body>
</html>
