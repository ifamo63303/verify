name: Cleanup Temp PDFs

on:
  schedule:
    - cron: '0 * * * *'  # Her saat başı
  workflow_dispatch:       # Manuel tetikleme için

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete temp PDFs older than 1 hour
        id: cleanup
        run: |
          deleted=$(find docs/temp -name "*.pdf" -mmin +60 -print -delete)
          if [ -n "$deleted" ]; then
            echo "deleted=true" >> $GITHUB_OUTPUT
          else
            echo "deleted=false" >> $GITHUB_OUTPUT
            echo "No temp PDFs to clean."
          fi

      - name: Commit changes
        if: steps.cleanup.outputs.deleted == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "cleanup: remove temp PDFs"
          git push
