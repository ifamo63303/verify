<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Verification – IFAMO GmbH</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: Arial, sans-serif; background: #404040; display: flex; }

    /* SIDEBAR */
    .sidebar {
      width: 220px; min-width: 220px; background: #fff;
      display: flex; flex-direction: column;
      padding: 24px 18px;
      box-shadow: 2px 0 12px rgba(0,0,0,.18);
      z-index: 1; overflow-y: auto;
    }
    .sb-logo    { font-size: 17px; font-weight: bold; color: #1a3a6b; margin-bottom: 2px; }
    .sb-addr    { font-size: 10px; color: #aaa; margin-bottom: 16px; line-height: 1.5; }
    .sb-divider { border: none; border-top: 2px solid #1a3a6b; margin-bottom: 16px; }
    .badge      { display: inline-block; background: #eafaf1; color: #27ae60; border: 1px solid #a9dfbf; border-radius: 12px; padding: 4px 10px; font-size: 11px; font-weight: bold; margin-bottom: 20px; }
    .field      { margin-bottom: 14px; }
    .field-label { font-size: 10px; font-weight: bold; color: #aaa; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .field-value { font-size: 13px; color: #222; font-weight: bold; word-break: break-word; }
    .spacer     { flex: 1; }
    .btn { display: block; width: 100%; padding: 11px 0; border: none; border-radius: 7px; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 8px; }
    .btn:hover  { opacity: .87; }
    .btn-dl     { background: #e65100; color: #fff; }
    .btn-view   { background: #2e7d32; color: #fff; }
    .btn-email  { background: #1565c0; color: #fff; }
    .btn-close  { background: #424242; color: #fff; }
    .sb-footer  { font-size: 9px; color: #ccc; text-align: center; margin-top: 12px; line-height: 1.5; }

    /* PDF VIEWER AREA */
    .pdf-wrap   { flex: 1; position: relative; overflow: hidden; background: #525659; }
    #pdf-viewer {
      width: 100%; height: 100%;
      overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 0;
    }
    #pdf-viewer canvas { display: block; margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.4); }

    /* LOADING */
    .loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #525659; color: #ccc; font-size: 14px; z-index: 5;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #666; border-top-color: #ccc;
      border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MOBILE PDF OVERLAY */
    #pdf-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: #525659;
      flex-direction: column;
    }
    #pdf-overlay.active { display: flex; }
    #overlay-close {
      background: #333; color: #fff; border: none;
      padding: 12px 20px; font-size: 15px; font-weight: bold;
      cursor: pointer; text-align: left; flex-shrink: 0;
    }
    #overlay-viewer {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 0;
    }
    #overlay-viewer canvas { display: block; margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.4); }

    /* MOBILE */
    @media (max-width: 700px) {
      html, body { height: auto; overflow: auto; background: #f0f2f5; }
      body { flex-direction: column; }
      .sidebar { width: 100%; min-width: 0; box-shadow: none; padding: 20px 16px 16px; }
      .sb-logo  { font-size: 20px; }
      .badge    { display: block; text-align: center; font-size: 13px; padding: 8px 14px; margin-bottom: 20px; }
      .field-label { font-size: 11px; }
      .field-value { font-size: 15px; }
      .spacer   { display: none; }
      .sb-footer { display: none; }
      .sidebar .btn { display: none; }
      .pdf-wrap { display: none; }
      .mobile-btns { display: flex !important; }
    }
    .mobile-btns {
      display: none; flex-direction: column; gap: 10px;
      padding: 16px; background: #f0f2f5;
    }
    .mobile-btns .btn { margin-bottom: 0; padding: 15px 0; font-size: 15px; border-radius: 10px; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sb-logo">IFAMO GmbH</div>
  <div class="sb-addr">Robert-Bosch-Stra&szlig;e 5 C<br>63303 Dreieich &middot; Germany</div>
  <hr class="sb-divider">
  <div class="badge">&#10003; Verified Document</div>
  <div class="field"><div class="field-label">Document No</div><div class="field-value" id="f-doc"></div></div>
  <div class="field"><div class="field-label">Date</div><div class="field-value" id="f-date"></div></div>
  <div class="field"><div class="field-label">Recipient</div><div class="field-value" id="f-recipient"></div></div>
  <div class="spacer"></div>
  <button class="btn btn-dl"    onclick="doDownload()">&#11015; Download PDF</button>
  <button class="btn btn-email" onclick="doEmail()">&#9993; Send by Email</button>
  <button class="btn btn-close" onclick="doClose()">&#10005; Close</button>
  <div class="sb-footer">IFAMO GmbH &middot; Dreieich<br>HRB 51794 Offenbach am Main</div>
</div>

<div class="pdf-wrap">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span id="loading-msg">Loading document...</span>
  </div>
  <div id="pdf-viewer"></div>
</div>

<!-- Mobile buttons -->
<div class="mobile-btns">
  <button class="btn btn-view"  onclick="doMobileView()">&#128196; View PDF</button>
  <button class="btn btn-dl"    onclick="doDownload()">&#11015; Download PDF</button>
  <button class="btn btn-email" onclick="doEmail()">&#9993; Send by Email</button>
  <button class="btn btn-close" onclick="doClose()">&#10005; Close</button>
</div>

<!-- Mobile PDF overlay -->
<div id="pdf-overlay">
  <button id="overlay-close" onclick="closeMobileView()">&#8592; Back</button>
  <div id="overlay-viewer"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUnUjn_pnFfngSH8DbV4owjvABT2A9-8wzspKMh3Ii1XWxZ9lhOIGN15ExuvNrEUW5/exec";

  var p         = new URLSearchParams(window.location.search);
  var docNo     = p.get('doc')       || '';
  var pdfId     = p.get('pdf')       || '';
  var date      = p.get('date')      || '';
  var recipient = p.get('recipient') || '';
  var mode      = p.get('mode')      || '';

  var ghFilename = null;
  var rawUrl     = null;

  document.title = 'Document Verification \u2013 ' + docNo;
  document.getElementById('f-doc').textContent       = docNo;
  document.getElementById('f-date').textContent      = date;
  document.getElementById('f-recipient').textContent = recipient;

  // ── PDF.js render ────────────────────────────────────────────────
  function renderPdfInto(container, url, width) {
    pdfjsLib.getDocument({ url: url, withCredentials: false }).promise
      .then(function(pdf) {
        document.getElementById('loading') && (document.getElementById('loading').style.display = 'none');
        var scale = (width - 32) / 595;
        if (scale < 0.5) scale = 0.5;
        for (var i = 1; i <= pdf.numPages; i++) {
          (function(n) {
            pdf.getPage(n).then(function(page) {
              var vp = page.getViewport({ scale: scale });
              var c  = document.createElement('canvas');
              c.width = vp.width; c.height = vp.height;
              container.appendChild(c);
              page.render({ canvasContext: c.getContext('2d'), viewport: vp });
            });
          })(i);
        }
      })
      .catch(function(err) {
        if (document.getElementById('loading')) {
          document.getElementById('loading-msg').textContent = 'Error: ' + err.message;
          document.getElementById('loading').querySelector('.spinner').style.display = 'none';
        }
      });
  }

  // ── Actions ──────────────────────────────────────────────────────
  function doDownload() {
    if (!rawUrl) return;
    fetch(rawUrl)
      .then(function(r) { return r.blob(); })
      .then(function(blob) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = docNo + '.pdf';
        document.body.appendChild(a);
        a.click();
        setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
      });
  }

  function doEmail() {
    if (!rawUrl) return;
    var verifyUrl = window.location.origin + window.location.pathname
      + '?doc=' + encodeURIComponent(docNo)
      + '&pdf=' + encodeURIComponent(rawUrl)
      + '&date=' + encodeURIComponent(date)
      + '&recipient=' + encodeURIComponent(recipient)
      + '&mode=github';
    var subject = 'Document Verification \u2013 ' + docNo + ' \u2013 IFAMO GmbH';
    var body =
      'Dear Sir or Madam,\n\n' +
      'Please find below the verified document issued by IFAMO GmbH:\n\n' +
      '  Document No : ' + docNo + '\n  Date        : ' + date +
      '\n  Recipient   : ' + recipient + '\n\n' +
      'View / Verify Document:\n' + verifyUrl + '\n\n' +
      'This document has been officially issued and verified by IFAMO GmbH.\n\n' +
      'Best regards,\nIFAMO GmbH\n\nRobert-Bosch-Stra\u00dfe 5 C \u00b7 63303 Dreieich \u00b7 Germany\n' +
      'Tel: +49 (0) 6103 509 5001\nwww.ifamo.de';
    window.location.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  }

  function doClose() {
    cleanup();
    if (window.history.length > 1) { window.history.back(); }
    else { try { window.close(); } catch(e) {} }
  }

  function doMobileView() {
    if (!rawUrl) return;
    var overlay = document.getElementById('pdf-overlay');
    var viewer  = document.getElementById('overlay-viewer');
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    if (!viewer.hasChildNodes()) {
      renderPdfInto(viewer, rawUrl, window.innerWidth);
    }
  }

  function closeMobileView() {
    document.getElementById('pdf-overlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  // ── Cleanup ──────────────────────────────────────────────────────
  function cleanup() {
    if (ghFilename) {
      navigator.sendBeacon
        ? navigator.sendBeacon(SCRIPT_URL + '?action=cleanup&filename=' + encodeURIComponent(ghFilename))
        : fetch(SCRIPT_URL + '?action=cleanup&filename=' + encodeURIComponent(ghFilename));
    }
  }
  window.addEventListener('beforeunload', cleanup);

  // ── Prepare ──────────────────────────────────────────────────────
  function onReady(url, filename) {
    rawUrl     = url;
    ghFilename = filename;
    if (window.innerWidth > 700) {
      renderPdfInto(document.getElementById('pdf-viewer'), url, document.querySelector('.pdf-wrap').offsetWidth);
    } else {
      document.getElementById('loading') && (document.getElementById('loading').style.display = 'none');
    }
  }

  if (mode === 'github' && pdfId.startsWith('http')) {
    onReady(pdfId, pdfId.split('/').pop());
  } else {
    fetch(SCRIPT_URL + '?action=prepare&pdf=' + encodeURIComponent(pdfId) + '&doc=' + encodeURIComponent(docNo))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) { onReady(data.url, data.filename); }
        else {
          document.getElementById('loading-msg').textContent = 'Error: ' + data.error;
          document.getElementById('loading').querySelector('.spinner').style.display = 'none';
        }
      })
      .catch(function() {
        document.getElementById('loading-msg').textContent = 'Connection error. Please try again.';
        document.getElementById('loading').querySelector('.spinner').style.display = 'none';
      });
  }
</script>
</body>
</html>
